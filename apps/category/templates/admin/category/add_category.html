<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Category - ShoeDrop Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
</head>

<body class="bg-[#0B0B0C] text-gray-400 min-h-screen flex antialiased">

    <!-- 1. LEFT SIDEBAR -->
    {% include 'admin/_sidebar.html' %}

    <!-- 2. MAIN CONTENT AREA -->
    <main class="flex-grow p-8 lg:p-12 space-y-8 overflow-y-auto max-w-2xl mx-auto w-full">
        {% include 'admin/_messages.html' %}

        <!-- Breadcrumb & Header -->
        <div class="space-y-2">
            <div class="flex items-center gap-2 text-[10px] font-bold tracking-widest text-gray-500 uppercase">
                <a href="{% url 'admin_dashboard' %}" class="hover:text-white transition-colors">Console</a>
                <span>/</span>
                <a href="{% url 'category_list' %}" class="hover:text-white transition-colors">Categories</a>
                <span>/</span>
                <span class="text-white">Add Category</span>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight uppercase">Add Category</h1>
        </div>

        <!-- Form Card -->
        <div class="bg-[#141416] border border-white/5 rounded-2xl p-6 sm:p-8 shadow-xl">
            <form method="POST" class="space-y-6">
                {% csrf_token %}
                
                <div class="space-y-2">
                    <label for="category_name" class="block text-[10px] font-bold tracking-widest text-gray-500 uppercase">Category Name</label>
                    <input 
                        type="text" 
                        id="category_name" 
                        name="name" 
                        placeholder="e.g., Sneakers, Boots, Accessories"
                        required
                        class="w-full bg-[#1C1C1E] border border-white/5 text-white text-xs px-4 py-3 rounded-xl outline-none focus:border-white/20 transition-colors placeholder-gray-650">
                </div>

                <div class="flex items-center gap-4 py-2">
                    <button
                        type="button"
                        id="toggle_btn"
                        onclick="toggleStatus()"
                        class="relative inline-flex h-6 w-11 shrink-0 cursor-pointer rounded-full border-2 border-transparent transition-colors duration-200 ease-in-out focus:outline-none bg-emerald-500">
                        <span
                            id="toggle_knob"
                            class="pointer-events-none inline-block h-5 w-5 transform rounded-full bg-white shadow ring-0 transition duration-200 ease-in-out translate-x-5">
                        </span>
                    </button>
                    <input type="hidden" name="is_active" id="is_active_input" value="True">
                    <div>
                        <span class="block text-xs font-bold text-white uppercase tracking-wider">Active Status</span>
                        <span class="text-[10px] text-gray-500 mt-0.5 block">This category will be visible to users</span>
                    </div>
                </div>

                <script>
                    function toggleStatus() {
                        const btn = document.getElementById('toggle_btn');
                        const knob = document.getElementById('toggle_knob');
                        const input = document.getElementById('is_active_input');
                        const isActive = input.value === 'True';
                        if (isActive) {
                            btn.classList.replace('bg-emerald-500', 'bg-zinc-800');
                            knob.classList.replace('translate-x-5', 'translate-x-0');
                            input.value = 'False';
                        } else {
                            btn.classList.replace('bg-zinc-800', 'bg-emerald-500');
                            knob.classList.replace('translate-x-0', 'translate-x-5');
                            input.value = 'True';
                        }
                    }
                </script>

                <div class="flex items-center gap-3 pt-4 border-t border-white/5">
                    <button 
                        type="submit" 
                        class="px-6 py-3 bg-white text-black rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-gray-200 transition-colors cursor-pointer">
                        Create Category
                    </button>
                    <a 
                        href="{% url 'category_list' %}" 
                        class="px-6 py-3 bg-zinc-800 text-white border border-white/10 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-zinc-750 transition-colors">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>

</body>

</html>
