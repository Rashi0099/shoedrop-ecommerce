<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoedrop Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body>

    <div class="min-h-screen bg-[#111111] flex flex-col font-sans relative px-4">

        
        <div class="flex-grow flex items-center justify-center">

            <div class="bg-[#f4f5f5] w-full max-w-[420px] rounded-[32px] px-8 py-12 md:px-10 shadow-2xl">

                <h1 class="text-[#222] text-xl md:text-2xl font-light tracking-[0.2em] text-center mb-2 uppercase">
                    Welcome Back
                </h1>
                <p class="text-[#888] text-[9px] font-medium tracking-[0.15em] text-center uppercase mb-10">
                    Sign in to manage operations
                </p>

                <form method="POST">
                    {% csrf_token %}
                    {% include 'admin/_messages.html' %}
                    <div class="mb-6">
                        <label class="block text-[#888] text-[9px] font-semibold tracking-[0.15em] uppercase mb-1">
                            Email Address
                        </label>
                        <input type="email" name="email" placeholder="Enter email" class="w-full bg-transparent border-b border-[#d1d1d1] pb-2 text-sm text-[#a3a3a3] font-light
                        focus:outline-none focus:border-[#777] transition-colors" />
                    </div>

                    <div class="mb-3">
                        <label class="block text-[#888] text-[9px] font-semibold tracking-[0.15em] uppercase mb-1">
                            Password
                        </label>
                        <div class="relative">
                            <input type="password" name="password" placeholder="Enter password" class="w-full bg-transparent border-b border-[#d1d1d1] pb-2 text-sm text-[#a3a3a3]
                                tracking-[0.2em] focus:outline-none focus:border-[#777] transition-colors pr-8" />

                            <button type="button"
                                class="absolute right-0 top-0 mt-0.5 text-[#888] hover:text-[#555] transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"
                                    stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                        d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    

                    <button type="submit"
                        class="w-full bg-[#1b4332] text-white text-[11px] font-bold tracking-[0.2em] uppercase py-4 rounded-full shadow-[0_10px_20px_rgba(27,67,50,0.15)] hover:bg-[#133124] hover:shadow-[0_10px_20px_rgba(27,67,50,0.3)] transition-all duration-300 mb-8">
                        Login
                    </button>

                    
                </form>
            </div>
        </div>

        <div class="w-full pb-6 flex justify-center text-center px-4">
            <p class="text-[#444] text-[9px] md:text-[10px] font-medium tracking-[0.15em] uppercase">
                © 2025 SHOEDROP ARCHIVE. ALL RIGHTS RESERVED.
            </p>
        </div>

    </div>

</body>

</html>
