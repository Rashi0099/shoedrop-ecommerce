<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shoedrop - Change Password</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#111111] text-white font-sans md:flex min-h-screen">

    {% include 'admin/_sidebar.html' %}

    <main class="flex-1 flex flex-col justify-between p-6 md:p-12 overflow-y-auto relative">
        
        <div class="flex-grow flex items-center justify-center w-full">
            
            <div class="bg-[#181818] border border-[#262626] w-full max-w-[520px] rounded-[32px] p-8 md:p-12 relative shadow-2xl overflow-hidden">
                
                <div class="absolute right-6 top-6 text-[#222222] opacity-40 pointer-events-none">
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1" stroke="currentColor" class="w-20 h-20">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 10-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 002.25-2.25v-6.75a2.25 2.25 0 00-2.25-2.25H6.75a2.25 2.25 0 00-2.25 2.25v6.75a2.25 2.25 0 002.25 2.25z" />
                    </svg>
                </div>

                <div class="relative z-10 mb-10 max-w-[85%]">
                    <h1 class="text-white text-xl font-semibold tracking-wide mb-2">
                        Change Password
                    </h1>
                    <p class="text-[#777] text-xs font-light leading-relaxed">
                        Ensure your administrative account remains secure with a complex password.
                    </p>
                </div>

                <form action="{% url 'admin_change_password' %}" method="POST" class="space-y-8 relative z-10">
                    {% csrf_token %}
                    {% include 'admin/_messages.html' %}
                    
                    <div>
                        <label class="block text-[#666] text-[9px] font-bold tracking-[0.15em] uppercase mb-1">
                            Current Password
                        </label>
                        <div class="relative">
                            <input type="password" name="current_password" placeholder="Enter current password"
                                class="w-full bg-transparent border-b border-[#2a2a2a] pb-2 text-sm text-[#888] tracking-[0.25em] focus:outline-none focus:border-[#555] transition-colors pr-8" />
                            
                            <button type="button" class="absolute right-0 top-0 mt-0.5 text-[#555] hover:text-[#888] transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[#666] text-[9px] font-bold tracking-[0.15em] uppercase mb-1">
                            New Password
                        </label>
                        <div class="relative">
                            <input type="password" name="new_password" placeholder="Enter new password"
                                class="w-full bg-transparent border-b border-[#2a2a2a] pb-2 text-sm text-[#888] tracking-[0.25em] focus:outline-none focus:border-[#555] transition-colors pr-8" />
                            
                            <button type="button" class="absolute right-0 top-0 mt-0.5 text-[#555] hover:text-[#888] transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div>
                        <label class="block text-[#666] text-[9px] font-bold tracking-[0.15em] uppercase mb-1">
                            Confirm New Password
                        </label>
                        <div class="relative">
                            <input type="password" name="confirm_password" placeholder="Confirm new password"
                                class="w-full bg-transparent border-b border-[#2a2a2a] pb-2 text-sm text-[#888] tracking-[0.25em] focus:outline-none focus:border-[#555] transition-colors pr-8" />
                            
                            <button type="button" class="absolute right-0 top-0 mt-0.5 text-[#555] hover:text-[#888] transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-4 h-4">
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 010-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178z" />
                                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <div class="pt-4">
                        <button type="submit"
                            class="w-full bg-[#9ed7bf] text-[#111111] text-[11px] font-bold tracking-[0.2em] uppercase py-4 rounded-full shadow-[0_4px_25px_rgba(158,215,191,0.25)] hover:bg-[#8bcbb0] hover:shadow-[0_4px_30px_rgba(158,215,191,0.4)] transition-all duration-300">
                            Update Password
                        </button>
                    </div>
                </form>

            </div>
        </div>

        <div class="w-full flex flex-col sm:flex-row justify-between items-center gap-2 pt-4 text-[9px] md:text-[10px] text-[#444] tracking-[0.15em] uppercase border-t border-[#1a1a1a]">
            <p>© 2026 SHOEDROP ADMINISTRATIVE LUXURY ECOSYSTEM</p>
            <div class="flex gap-6">
                <a href="#" class="hover:text-[#666] transition-colors">Security Protocol</a>
                <a href="#" class="hover:text-[#666] transition-colors">Privacy Policy</a>
            </div>
        </div>
        
    </main>

</body>
</html>
