<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>ShoeDrop OTP</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            margin: 0;
            padding: 0;
            color: #333333;
        }
        .container {
            max-width: 600px;
            margin: 40px auto;
            background-color: #ffffff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid #e5e7eb;
        }
        .header {
            background-color: #032b1d;
            padding: 30px;
            text-align: center;
        }
        .logo-text {
            color: #ffffff;
            font-size: 28px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            margin: 0;
        }
        .content {
            padding: 40px 30px;
        }
        .title {
            font-size: 20px;
            font-weight: 700;
            color: #111827;
            margin-top: 0;
            margin-bottom: 16px;
        }
        .message {
            font-size: 16px;
            line-height: 1.6;
            color: #4b5563;
            margin-bottom: 24px;
        }
        .otp-container {
            background-color: #f3f4f6;
            border: 1px dashed #d1d5db;
            border-radius: 8px;
            padding: 24px;
            text-align: center;
            margin-bottom: 24px;
        }
        .otp-code {
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 8px;
            color: #032b1d;
            margin: 0;
        }
        .footer {
            background-color: #f9fafb;
            padding: 20px 30px;
            text-align: center;
            border-top: 1px solid #e5e7eb;
        }
        .footer-text {
            font-size: 13px;
            color: #6b7280;
            margin: 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1 class="logo-text">SHOEDROP</h1>
        </div>
        <div class="content">
            {% if username %}
                <h2 class="title">Hello {{ username }},</h2>
            {% else %}
                <h2 class="title">Hello,</h2>
            {% endif %}
            
            <p class="message">{{ message }}</p>
            
            <div class="otp-container">
                <p class="otp-code">{{ otp }}</p>
            </div>
            
            <p class="message" style="font-size: 14px; margin-bottom: 0;">
                This OTP is valid for <strong>1 minute</strong>. Please do not share this code with anyone. If you didn't request this, you can safely ignore this email.
            </p>
        </div>
        <div class="footer">
            <p class="footer-text">&copy; {% now "Y" %} ShoeDrop. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
