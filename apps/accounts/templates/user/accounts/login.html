<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShoeDrop - Log In</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 font-sans antialiased">

  <div class="relative flex min-h-screen flex-col justify-between px-4 py-6 sm:px-6 lg:px-8">
    <!-- Background Image with Overlay -->
    <div class="absolute inset-0 z-0">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop"
        alt="Performance Shoe Background" class="h-full w-full object-cover opacity-45 brightness-[0.40]" />
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    </div>

    <!-- Header Logo -->
    <header class="relative z-10 w-full max-w-7xl mx-auto pl-2">
      <span class="text-xl font-black tracking-tight text-emerald-500 sm:text-2xl">
        Shoe<span class="text-emerald-400">Drop</span>
      </span>
    </header>

    <!-- Log In Card Container -->
    <main
      class="relative z-10 my-auto w-full max-w-sm mx-auto transform rounded-xl bg-white/10 p-5 shadow-2xl backdrop-blur-md border border-white/20 sm:p-6">

      <!-- Header -->
      <div class="text-center mb-5">
        <h2 class="text-xl font-extrabold uppercase tracking-wider text-white sm:text-2xl">
          Log In
        </h2>
      </div>

      <!-- Form -->
      <form class="space-y-3" action="#" method="POST">

        {% csrf_token %}

        {% if messages %}
        {% for message in messages %}
        <div class="rounded-lg border border-red-500 bg-red-500/10 px-4 py-3 text-sm text-red-300">
          {{ message }}
        </div>
        {% endfor %}
        {% endif %}

        <!-- Email Address -->
        <div>
          <label for="email" class="block text-[10px] font-bold uppercase tracking-wide text-white/80">
            Email Address
          </label>
          <div class="mt-1 relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-white/40">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
              </svg>
            </div>
            <input id="email" name="email" type="email" required placeholder="performance@shoedrop.com"
              class="block w-full rounded-full border border-white/10 bg-white/5 pl-9 pr-4 py-2 text-white placeholder-white/30 text-xs ring-1 ring-inset ring-transparent transition focus:border-white/30 focus:bg-white/10 focus:placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 sm:text-sm" />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-[10px] font-bold uppercase tracking-wide text-white/80">
            Password
          </label>
          <div class="mt-1 relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-white/40">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25Z" />
              </svg>
            </div>
            <input id="password" name="password" type="password" required placeholder="Enter password"
              class="block w-full rounded-full border border-white/10 bg-white/5 pl-9 pr-4 py-2 text-white" />
          </div>
        </div>

        <!-- Sleek Gray Login Button -->
        <div class="pt-2">
          <button type="submit"
            class="flex w-full justify-center rounded-full bg-gray-800 px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-white shadow-lg hover:bg-gray-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white/50 active:scale-[0.98] transition duration-150 sm:text-sm">
            Login
          </button>
        </div>
      </form>

      <!-- Divider -->
      <div class="mt-4">
        <div class="relative flex items-center justify-center">
          <div class="w-full border-t border-white/10"></div>
          <span
            class="absolute bg-transparent backdrop-blur-sm px-3 text-[10px] font-bold uppercase tracking-wider text-white/40">
            Or Continue With
          </span>
        </div>
      </div>

      <!-- Google Button -->
      <div class="mt-4">
        <button type="button"
          class="flex w-full items-center justify-center gap-2 rounded-full border border-white/10 bg-white/5 px-4 py-2 text-xs font-semibold text-white shadow-sm hover:border-white/20 hover:bg-white/10 active:scale-[0.98] transition duration-150 sm:text-sm">
          <svg class="h-3.5 w-3.5" viewBox="0 0 24 24" width="24" height="24">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
            <path fill="none" d="M1 1h22v22H1z" />
          </svg>
          <span>Google</span>
        </button>
      </div>

      <!-- Links section (Forgot Password & Small Sign Up link added here) -->
      <div class="mt-5 flex flex-col items-center justify-center gap-2 text-center border-t border-white/5 pt-3">
        <a href="#"
          class="text-[11px] font-medium text-white/50 hover:text-white transition hover:underline hover:underline-offset-4">
          Forgot Password?
        </a>
        <p class="text-[11px] text-white/40">
          Don't have an account?
          <a href="{%url 'signup'%}" class="font-bold text-white hover:underline hover:underline-offset-4">
            Sign Up
          </a>
        </p>
      </div>

    </main>

    <!-- Footer -->
    <footer
      class="relative z-10 w-full max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2 pt-6 text-[10px] text-white/30 tracking-wide">
      <p>© 2026 ShoeDrop Performance. All rights reserved.</p>
      <div class="flex gap-4">
        <a href="#" class="hover:text-white/50 transition">Terms of Service</a>
        <a href="#" class="hover:text-white/50 transition">Help Center</a>
      </div>
    </footer>

  </div>

</body>

</html>
