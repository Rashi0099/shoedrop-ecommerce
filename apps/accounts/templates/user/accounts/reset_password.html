<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShoeDrop - Create New Password</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 font-sans antialiased selection:bg-emerald-500/30 selection:text-emerald-200">

  <div class="relative flex min-h-screen flex-col justify-between px-6 py-6 lg:px-8">
    <!-- Background Image with Overlay -->
    <div class="absolute inset-0 z-0">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop"
        alt="Performance Shoe Background" class="h-full w-full object-cover opacity-30 brightness-[0.35]" />
      <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/70 backdrop-blur-[6px]"></div>
    </div>

    <!-- Header Logo -->
    <header class="relative z-10 w-full max-w-7xl mx-auto">
      <span class="text-lg font-black tracking-[0.2em] text-white uppercase">
        SHOE<span class="text-emerald-400">DROP</span>
      </span>
    </header>

    <!-- Create New Password Card Container -->
    <main
      class="relative z-10 my-auto w-full max-w-[380px] mx-auto transform rounded-2xl bg-black/40 p-6 md:p-8 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] backdrop-blur-xl border border-white/10 transition-all duration-300">

      <!-- Header -->
      <div class="mb-6">
        <h2 class="text-xl font-black uppercase tracking-widest text-white">
          New Password
        </h2>
        <p class="text-[11px] text-gray-400 mt-1 font-medium">
          Secure your account with new credentials.
        </p>
      </div>

      {% if messages %}
      {% for message in messages %}
      <div class="mb-4 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-xs font-medium text-red-400">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <!-- Form -->
      <form method="POST" class="space-y-4">

        {% csrf_token %}
        
        <!-- New Password -->
        <div>
          <label for="new-password" class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            New Password
          </label>
          <div class="mt-1.5 relative">
            <input id="new-password" name="password" type="password" required placeholder="••••••••"
              class="block w-full rounded-xl border border-white/10 bg-white/5 pl-4 pr-10 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
            <div class="absolute inset-y-0 right-0 flex items-center pr-3.5">
              <button type="button" class="text-gray-500 hover:text-white transition focus:outline-none">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Confirm New Password -->
        <div>
          <label for="confirm-password" class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            Confirm New Password
          </label>
          <div class="mt-1.5 relative">
            <input id="confirm-password" name="confirm_password" type="password" required placeholder="••••••••"
              class="block w-full rounded-xl border border-white/10 bg-white/5 pl-4 pr-10 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
            <div class="absolute inset-y-0 right-0 flex items-center pr-3.5">
              <button type="button" class="text-gray-500 hover:text-white transition focus:outline-none">
                <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <!-- Premium Submit Button -->
        <div class="pt-2">
          <button type="submit"
            class="flex w-full justify-center rounded-xl bg-emerald-500 hover:bg-emerald-400 px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-gray-950 shadow-lg shadow-emerald-500/10 active:scale-[0.99] transition duration-150">
            Reset Password
          </button>
        </div>
      </form>

      <!-- Navigation & Support Links -->
      <div class="mt-6 text-center border-t border-white/5 pt-4 flex flex-col items-center gap-2.5">
        <a href="{% url 'login' %}"
          class="inline-flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-gray-400 hover:text-white transition">
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
          </svg>
          <span>Back to Login</span>
        </a>

        <p class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mt-0.5">
          Need Help? <a href="#" class="text-gray-300 hover:text-emerald-400 underline underline-offset-4 transition">Contact Support</a>
        </p>
      </div>

    </main>

    <!-- Footer -->
    <footer
      class="relative z-10 w-full max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 pt-4 text-[10px] text-gray-500 font-medium tracking-wide">
      <p>© 2026 ShoeDrop Performance. All rights reserved.</p>
      <div class="flex gap-5">
        <a href="#" class="hover:text-gray-300 transition">Terms of Service</a>
        <a href="#" class="hover:text-gray-300 transition">Help Center</a>
      </div>
    </footer>

  </div>

</body>

</html>
