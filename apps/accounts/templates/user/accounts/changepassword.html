<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Change Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-cover bg-center bg-no-repeat flex items-center justify-center p-4" 
      style="background-image: url('https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop');">

  <div class="w-full max-w-md bg-white/95 backdrop-blur-sm rounded-3xl p-8 md:p-10 shadow-2xl transition-all duration-300">
    
    <div class="text-center mb-8">
      <h2 class="text-2xl md:text-3xl font-bold text-black tracking-tight">Change Password</h2>
      <p class="text-xs md:text-sm text-gray-500 mt-1">Secure your account with new credentials</p>
    </div>

    <form class="space-y-5" onsubmit="event.preventDefault();">
      
      <div>
        <label class="block text-[10px] md:text-xs font-bold text-black uppercase tracking-wider mb-2">
          Current Password
        </label>
        <input 
          type="password" 
          placeholder="••••••••" 
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-700 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-sm transition-all"
        >
      </div>

      <div>
        <label class="block text-[10px] md:text-xs font-bold text-black uppercase tracking-wider mb-2">
          New Password
        </label>
        <input 
          type="password" 
          placeholder="••••••••" 
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-700 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-sm transition-all"
        >
      </div>

      <div>
        <label class="block text-[10px] md:text-xs font-bold text-black uppercase tracking-wider mb-2">
          Confirm New Password
        </label>
        <input 
          type="password" 
          placeholder="••••••••" 
          class="w-full px-4 py-3 border border-gray-200 rounded-xl text-gray-700 placeholder-gray-300 focus:outline-none focus:ring-2 focus:ring-black focus:border-transparent text-sm transition-all"
        >
        <p class="text-xs text-orange-600 mt-2 font-medium">Passwords do not match</p>
      </div>

      <div class="text-right">
        <a href="#" class="text-xs font-semibold text-black hover:underline transition-all">
          Forgot Password?
        </a>
      </div>

      <button 
        type="submit" 
        class="w-full bg-black text-white py-3.5 px-4 rounded-full font-bold text-sm md:text-base hover:bg-gray-900 shadow-lg hover:shadow-xl active:scale-[0.98] transition-all duration-200 mt-4"
      >
        Save Changes
      </button>

    </form>
  </div>

</body>
</html>
