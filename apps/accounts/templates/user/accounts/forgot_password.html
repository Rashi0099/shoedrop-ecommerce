<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShoeDrop - Forgot Password</title>
  <!-- Tailwind CSS Play CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 font-sans antialiased selection:bg-emerald-500/30 selection:text-emerald-200">

  <div class="relative flex min-h-screen flex-col justify-between px-6 py-6 lg:px-8">
    <!-- Background Image with Overlay -->
    <div class="absolute inset-0 z-0">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop"
        alt="Performance Shoe Background" class="h-full w-full object-cover opacity-30 brightness-[0.35]" />
      <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/70 backdrop-blur-[6px]"></div>
    </div>

    <!-- Header Logo -->
    <header class="relative z-10 w-full max-w-7xl mx-auto">
      <span class="text-lg font-black tracking-[0.2em] text-white uppercase">
        SHOE DROP</span>
      </span>
    </header>

    <!-- Forgot Password Card Container -->
    <main
      class="relative z-10 my-auto w-full max-w-[380px] mx-auto transform rounded-2xl bg-black/40 p-6 md:p-8 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] backdrop-blur-xl border border-white/10 transition-all duration-300">

      <!-- Header -->
      <div class="mb-6">
        <h2 class="text-xl font-black uppercase tracking-widest text-white">
          Forgot Password
        </h2>
        <p class="text-[11px] text-gray-400 mt-1 font-medium">
          Enter your email to reset your access.
        </p>
      </div>

      {% if messages %}
      {% for message in messages %}
      <div class="mb-4 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-xs font-medium text-red-400">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <!-- Form -->
      <form method="POST" class="space-y-4">

        {% csrf_token %}

        <!-- Email Address -->
        <div>
          <label for="email" class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            Email Address
          </label>
          <div class="mt-1.5 relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3.5 pointer-events-none text-gray-500">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
              </svg>
            </div>
            <input id="email" name="email" type="email" autocomplete="email" required placeholder="name@example.com"
              class="block w-full rounded-xl border border-white/10 bg-white/5 pl-10 pr-4 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
          </div>
        </div>

        <!-- Premium Submit Button -->
        <div class="pt-2">
          <button type="submit"
            class="flex w-full items-center justify-center gap-2 rounded-xl bg-emerald-500 hover:bg-emerald-400 px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-gray-950 shadow-lg shadow-emerald-500/10 active:scale-[0.99] transition duration-150">
            <span>Send OTP</span>
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
          </button>
        </div>
      </form>

      <!-- Back to Login Navigation -->
      <div class="mt-6 text-center border-t border-white/5 pt-4">
        <a href="{% url 'login' %}"
          class="inline-flex items-center gap-2 text-xs font-bold uppercase tracking-wider text-gray-400 hover:text-white transition">
          <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
          </svg>
          <span>Back to Login</span>
        </a>
      </div>

    </main>

    <!-- Footer -->
    <footer
      class="relative z-10 w-full max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 pt-4 text-[10px] text-gray-500 font-medium tracking-wide">
      <p>© 2026 ShoeDrop Performance. All rights reserved.</p>
      <div class="flex gap-5">
        <a href="#" class="hover:text-gray-300 transition">Terms of Service</a>
        <a href="#" class="hover:text-gray-300 transition">Help Center</a>
      </div>
    </footer>

  </div>

</body>

</html>
