<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Addresses - ShoeDrop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-[#F8F9FA] text-gray-800 min-h-screen relative flex flex-col justify-between antialiased overflow-hidden">

  <!-- BACKGROUND CONTENT LAYER (With absolute blur overlay mimicking image_b1b72d.png) -->
  <div class="w-full h-full flex flex-col justify-between filter blur-[4px] pointer-events-none select-none">
    
    <!-- Header -->
    <nav class="bg-white border-b border-gray-100">
      <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex justify-between items-center">
        <span class="text-xl font-black tracking-[0.2em] text-[#111]">SHOEDROP</span>
        <div class="hidden md:flex space-x-10 text-xs font-bold tracking-widest text-gray-400 uppercase">
          <span>Ladies</span><span>Kids</span><span>Western Wear</span>
        </div>
        <div class="w-20"></div>
      </div>
    </nav>

    <!-- Content Dashboard Mock -->
    <div class="max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-10 flex-grow grid grid-cols-4 gap-8">
      <aside class="col-span-1 space-y-4">
        <div class="h-4 bg-gray-200 rounded w-2/3"></div>
        <div class="h-10 bg-gray-200 rounded-xl"></div>
        <div class="h-10 bg-gray-100 rounded-xl"></div>
      </aside>
      <main class="col-span-3 space-y-6">
        <div class="flex justify-between items-center">
          <div class="h-8 bg-gray-200 rounded w-1/3"></div>
          <div class="h-10 bg-gray-800 rounded-xl w-32"></div>
        </div>
        <div class="grid grid-cols-2 gap-6">
          <div class="h-48 bg-white border border-gray-200 rounded-2xl p-6"></div>
          <div class="h-48 bg-white border border-gray-200 rounded-2xl p-6"></div>
        </div>
      </main>
    </div>

    <!-- Footers -->
    <div class="bg-white py-8 border-t border-gray-100 text-center space-y-2">
      <span class="text-xs font-black text-black tracking-widest">SHOEDROP</span>
    </div>
  </div>

  <!-- MODAL OVERLAY WRAPPER -->
  <div class="fixed inset-0 z-50 bg-black/40 backdrop-blur-[2px] flex items-center justify-center p-4">
    
    <!-- Main Modal Card Box -->
    <div class="w-full max-w-[480px] bg-white rounded-[2.5rem] p-8 md:p-10 shadow-[0_25px_60px_-15px_rgba(0,0,0,0.3)] text-center transform scale-100 transition-all duration-300">
      
      <!-- Trash Bin Icon Circle Container -->
      <div class="w-16 h-16 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
        <svg class="w-7 h-7 text-red-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-16v1a3 3 0 006 0V4M9 7h6" />
        </svg>
      </div>

      <!-- Dialogue Titles -->
      <h2 class="text-base md:text-lg font-black tracking-wide text-gray-900 uppercase max-w-xs mx-auto leading-snug">
        Are you sure you want to delete this address?
      </h2>
      <p class="text-xs md:text-sm text-gray-400 font-medium mt-2 mb-8">
        This action cannot be undone.
      </p>

      <!-- Action Confirmation Buttons Grid (Completely Green To Pure Black Theme) -->
      <div class="grid grid-cols-2 gap-4">
        <!-- Cancel Action -->
        <button type="button" class="w-full border-2 border-gray-200 hover:bg-gray-50 text-gray-500 hover:text-black py-3.5 px-4 rounded-xl text-xs font-bold tracking-widest uppercase transition-colors">
          Cancel
        </button>
        <!-- Confirm Delete Action (Pure Black Accent) -->
        <button type="button" class="w-full bg-[#111111] hover:bg-black text-white py-3.5 px-4 rounded-xl text-xs font-bold tracking-widest uppercase shadow-md active:scale-[0.99] transition-all">
          Delete
        </button>
      </div>

    </div>
  </div>

</body>
</html>
