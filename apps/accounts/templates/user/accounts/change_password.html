<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShoeDrop - Change Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 font-sans antialiased selection:bg-emerald-500/30 selection:text-emerald-200">

  <div class="relative flex min-h-screen flex-col justify-between px-6 py-6 lg:px-8">
    <div class="absolute inset-0 z-0">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop"
        alt="Performance Shoe Background" class="h-full w-full object-cover opacity-30 brightness-[0.35]" />
      <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/70 backdrop-blur-[6px]"></div>
    </div>

    <header class="relative z-10 w-full max-w-7xl mx-auto">
      <span class="text-lg font-black tracking-[0.2em] text-white uppercase">
        SHOE<span class="text-emerald-400">DROP</span>
      </span>
    </header>

    <main
      class="relative z-10 my-auto w-full max-w-[390px] mx-auto transform rounded-2xl bg-black/40 p-6 md:p-8 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] backdrop-blur-xl border border-white/10 transition-all duration-300">

      <div class="mb-6">
        <h2 class="text-xl font-black uppercase tracking-widest text-white">
          Change Password
        </h2>
        <p class="text-[11px] text-gray-400 mt-1 font-medium">
          Secure your account with new credentials.
        </p>
      </div>

      {% if messages %}
      {% for message in messages %}
      <div class="mb-4 rounded-xl border border-red-500/30 bg-red-500/10 px-4 py-3 text-xs font-medium text-red-400">
        {{ message }}
      </div>
      {% endfor %}
      {% endif %}

      <form method="POST" class="space-y-4">
        {% csrf_token %}

        <div>
          <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            Current Password
          </label>
          <div class="mt-1.5 relative">
            <input type="password" name="current_password" required placeholder="••••••••"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
          </div>
        </div>

        <div>
          <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            New Password
          </label>
          <div class="mt-1.5 relative">
            <input type="password" name="new_password" required placeholder="••••••••"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
          </div>
        </div>

        <div>
          <label class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            Confirm New Password
          </label>
          <div class="mt-1.5 relative">
            <input type="password" name="confirm_password" required placeholder="••••••••"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
          </div>
        </div>

        <div class="text-right pt-0.5">
          <a href="{% url 'forgot_password' %}" class="text-xs font-semibold text-emerald-400 hover:text-emerald-300 transition">
            Forgot Password?
          </a>
        </div>

        <div class="pt-2">
          <button type="submit"
            class="flex w-full justify-center rounded-xl bg-emerald-500 hover:bg-emerald-400 px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-gray-950 shadow-lg shadow-emerald-500/10 active:scale-[0.99] transition duration-150">
            Save Changes
          </button>
        </div>
      </form>

    </main>

    <footer
      class="relative z-10 w-full max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-4 pt-4 text-[10px] text-gray-500 font-medium tracking-wide">
      <p>© 2026 ShoeDrop Performance. All rights reserved.</p>
      <div class="flex gap-5">
        <a href="#" class="hover:text-gray-300 transition">Terms of Service</a>
        <a href="#" class="hover:text-gray-300 transition">Help Center</a>
      </div>
    </footer>

  </div>

</body>

</html>
