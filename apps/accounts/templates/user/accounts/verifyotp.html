<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Your Identity - Shoedrop</title>
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen relative flex flex-col justify-between items-center p-4 bg-[#111] overflow-hidden select-none">
  
  <!-- Premium Dark Shoe Background Layer with Dark Overlay -->
  <div class="absolute inset-0 z-0 bg-cover bg-center scale-105 brightness-[0.25] contrast-[1.1]" 
       style="background-image: url('https://images.unsplash.com/photo-1600185365483-26d7a4cc7519?q=80&w=1925&auto=format&fit=crop');">
  </div>

  <!-- Top Header / Logo -->
  <header class="w-full max-w-6xl mx-auto z-10 pt-4 md:pt-6 px-4">
    <h1 class="text-white font-black tracking-[0.2em] text-sm md:text-base uppercase text-left opacity-90">
      SHOEDROP
    </h1>
  </header>

  <!-- Main Verification Card -->
  <main class="w-full max-w-[440px] bg-white rounded-[2.5rem] p-8 md:p-12 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.7)] text-center z-10 my-auto transition-all duration-300">
    
    <!-- Heading -->
    <h2 class="text-xl md:text-2xl font-black text-[#1a1a1a] tracking-tight uppercase mb-2">
      Verify Your Identity
    </h2>
    <p class="text-xs md:text-sm text-gray-500 font-medium px-2 leading-relaxed mb-8">
      We've sent a 6-digit code to your email.
    </p>

    <!-- OTP Input Fields Grid -->
    <form onsubmit="event.preventDefault();" class="space-y-6">
      <div class="grid grid-cols-6 gap-2 md:gap-3 justify-center mb-6">
        <input type="text" maxlength="1" placeholder="•" class="w-full aspect-square text-center text-gray-800 font-bold text-lg md:text-xl bg-[#f4f4f4] border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#111] focus:bg-white transition-all">
        <input type="text" maxlength="1" placeholder="•" class="w-full aspect-square text-center text-gray-800 font-bold text-lg md:text-xl bg-[#f4f4f4] border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#111] focus:bg-white transition-all">
        <input type="text" maxlength="1" placeholder="•" class="w-full aspect-square text-center text-gray-800 font-bold text-lg md:text-xl bg-[#f4f4f4] border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#111] focus:bg-white transition-all">
        <input type="text" maxlength="1" placeholder="•" class="w-full aspect-square text-center text-gray-800 font-bold text-lg md:text-xl bg-[#f4f4f4] border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#111] focus:bg-white transition-all">
        <input type="text" maxlength="1" placeholder="•" class="w-full aspect-square text-center text-gray-800 font-bold text-lg md:text-xl bg-[#f4f4f4] border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#111] focus:bg-white transition-all">
        <input type="text" maxlength="1" placeholder="•" class="w-full aspect-square text-center text-gray-800 font-bold text-lg md:text-xl bg-[#f4f4f4] border border-gray-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-[#111] focus:bg-white transition-all">
      </div>

      <!-- Resend Code Section -->
      <div class="space-y-1">
        <button type="button" class="text-[10px] md:text-xs font-bold text-gray-400 tracking-widest uppercase hover:text-black transition-colors">
          Resend Code
        </button>
        <p class="text-[11px] font-semibold text-gray-400">00:59</p>
      </div>

      <!-- Submit Button (Dark Forest Green Accent) -->
      <button type="submit" class="w-full bg-[#143d30] text-white py-3.5 px-6 rounded-full font-bold text-xs md:text-sm tracking-widest uppercase shadow-[0_10px_20px_rgba(20,61,48,0.3)] hover:bg-[#0f3025] active:scale-[0.99] transition-all duration-200">
        Verify & Proceed
      </button>
    </form>

    <!-- Back to Login -->
    <div class="mt-6">
      <a href="#" class="inline-flex items-center justify-center gap-2 text-[10px] md:text-xs font-bold text-gray-400 tracking-widest uppercase hover:text-black transition-colors">
        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
        </svg>
        Back to Login
      </a>
    </div>

  </main>

  <!-- Bottom Footer -->
  <footer class="w-full z-10 pb-4 text-center">
    <p class="text-[10px] text-gray-600 font-bold tracking-[0.25em] uppercase">
      © 2024 Shoedrop Archive.
    </p>
  </footer>

</body>
</html>
