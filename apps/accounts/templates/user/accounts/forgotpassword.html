<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShoeDrop - Forgot Password</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-950 font-sans antialiased">

  <div class="relative flex min-h-screen flex-col justify-between px-4 py-6 sm:px-6 lg:px-8">
    <div class="absolute inset-0 z-0">
      <img 
        src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop" 
        alt="Performance Shoe Background" 
        class="h-full w-full object-cover opacity-45 brightness-[0.40]"
      />
      <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    </div>

    <header class="relative z-10 w-full max-w-7xl mx-auto pl-2">
      <span class="text-xl font-black tracking-tight text-emerald-500 sm:text-2xl">
        Shoe<span class="text-emerald-400">Drop</span>
      </span>
    </header>

    <main class="relative z-10 my-auto w-full max-w-sm mx-auto transform rounded-xl bg-white/10 p-5 shadow-2xl backdrop-blur-md border border-white/20 sm:p-6">
      
      <div class="text-center mb-5">
        <h2 class="text-xl font-extrabold uppercase tracking-wider text-white sm:text-2xl">
          Forgot Password
        </h2>
        <p class="mt-1 text-xs text-white/60 font-medium">
          Enter your email to reset your access.
        </p>
      </div>

      <form class="space-y-4" action="#" method="POST">
        
        <div>
          <label for="email" class="block text-[10px] font-bold uppercase tracking-wide text-white/80">
            Email Address
          </label>
          <div class="mt-1 relative">
            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-white/40">
              <svg class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M21.75 6.75v10.5a2.25 2.25 0 0 1-2.25 2.25h-15a2.25 2.25 0 0 1-2.25-2.25V6.75m19.5 0A2.25 2.25 0 0 0 19.5 4.5h-15a2.25 2.25 0 0 0-2.25 2.25m19.5 0v.243a2.25 2.25 0 0 1-1.07 1.916l-7.5 4.615a2.25 2.25 0 0 1-2.36 0L3.32 8.91a2.25 2.25 0 0 1-1.07-1.916V6.75" />
              </svg>
            </div>
            <input 
              id="email" 
              name="email" 
              type="email" 
              autocomplete="email" 
              required 
              placeholder="name@example.com"
              class="block w-full rounded-full border border-white/10 bg-white/5 pl-9 pr-4 py-2 text-white placeholder-white/30 text-xs ring-1 ring-inset ring-transparent transition focus:border-white/30 focus:bg-white/10 focus:placeholder-white/50 focus:outline-none focus:ring-2 focus:ring-white/40 sm:text-sm"
            />
          </div>
        </div>

        <div class="pt-1">
          <button 
            type="submit" 
            class="flex w-full items-center justify-center gap-2 rounded-full bg-gray-800 px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-white shadow-lg hover:bg-gray-900 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-white/50 active:scale-[0.98] transition duration-150 sm:text-sm"
          >
            <span>Send Reset Link</span>
            <svg class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
            </svg>
          </button>
        </div>
      </form>

      <div class="mt-5 text-center border-t border-white/5 pt-4">
        <a href="#" class="inline-flex items-center gap-1.5 text-[11px] font-bold uppercase tracking-wider text-white/60 hover:text-white transition hover:underline hover:underline-offset-4">
          <svg class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
          </svg>
          <span>Back to Login</span>
        </a>
      </div>

    </main>

    <footer class="relative z-10 w-full max-w-7xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-2 pt-6 text-[10px] text-white/30 tracking-wide">
      <p>© 2026 ShoeDrop Performance. All rights reserved.</p>
      <div class="flex gap-4">
        <a href="#" class="hover:text-white/50 transition">Terms of Service</a>
        <a href="#" class="hover:text-white/50 transition">Help Center</a>
      </div>
    </footer>

  </div>

</body>
</html>
