{% extends 'user/base.html' %}

{% block content %}
<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account - ShoeDrop</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-950 font-sans antialiased selection:bg-emerald-500/30 selection:text-emerald-200">

  <div class="relative flex min-h-screen items-center justify-center px-6 py-8 sm:px-6 lg:px-8">
    <div class="absolute inset-0 z-0">
      <img src="https://images.unsplash.com/photo-1542291026-7eec264c27ff?q=80&w=2070&auto=format&fit=crop"
        alt="Performance Shoe Background" class="h-full w-full object-cover opacity-30 brightness-[0.35]" />
      <div class="absolute inset-0 bg-gradient-to-b from-black/60 via-black/40 to-black/70 backdrop-blur-[6px]"></div>
    </div>


    <main
      class="relative z-10 w-full max-w-[390px] mx-auto transform rounded-2xl bg-black/40 p-6 md:p-8 shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] backdrop-blur-xl border border-white/10 transition-all duration-300">

      <div class="mb-5">
        <h2 class="text-xl font-black uppercase tracking-widest text-white">
          Create Account
        </h2>
        <p class="text-[11px] text-gray-400 mt-1 font-medium">
          Join the performance community today.
        </p>
      </div>

      <form class="space-y-3.5" method="POST">

        {% csrf_token %}
        {% include 'user/_messages.html' %}



        <div>
          <label for="full-name" class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            Full Name
          </label>
          <div class="mt-1 relative">
            <input id="full-name" name="username" type="text" required placeholder="John Doe"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
          </div>
        </div>

        <div>
          <label for="email" class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            Email Address
          </label>
          <div class="mt-1 relative">
            <input id="email" name="email" type="email" autocomplete="email" required placeholder="name@example.com"
              class="block w-full rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
          </div>
        </div>

        <div>
          <label for="password" class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            Password
          </label>
          <div class="mt-1 relative">
            <input id="password" name="password" type="password" required placeholder="••••••••"
              class="block w-full rounded-xl border border-white/10 bg-white/5 pl-4 pr-10 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
            <div class="absolute inset-y-0 right-0 flex items-center pr-3.5">
              <button type="button" onclick="togglePassword('password', 'password-eye-icon')" class="text-gray-500 hover:text-white transition focus:outline-none">
                <svg id="password-eye-icon" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                  <path class="eye-closed hidden" stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        <div>
          <label for="confirm-password" class="block text-[10px] font-bold uppercase tracking-wider text-gray-300">
            Confirm Password
          </label>
          <div class="mt-1 relative">
            <input id="confirm-password" name="confirm_password" type="password" required placeholder="••••••••"
              class="block w-full rounded-xl border border-white/10 bg-white/5 pl-4 pr-10 py-2.5 text-white placeholder-gray-500 text-xs transition duration-200 focus:border-emerald-400/50 focus:bg-white/[0.08] focus:outline-none focus:ring-1 focus:ring-emerald-400/30" />
            <div class="absolute inset-y-0 right-0 flex items-center pr-3.5">
              <button type="button" onclick="togglePassword('confirm-password', 'confirm-eye-icon')" class="text-gray-500 hover:text-white transition focus:outline-none">
                <svg id="confirm-eye-icon" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor">
                  <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.639C3.423 7.51 7.36 4.5 12 4.5c4.638 0 8.573 3.007 9.963 7.178.07.207.07.431 0 .639C20.577 16.49 16.64 19.5 12 19.5c-4.638 0-8.573-3.007-9.963-7.178Z" />
                  <path class="eye-open" stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                  <path class="eye-closed hidden" stroke-linecap="round" stroke-linejoin="round" d="M3.98 8.223A10.477 10.477 0 0 0 1.934 12C3.226 16.338 7.244 19.5 12 19.5c.993 0 1.953-.138 2.863-.395M6.228 6.228A10.451 10.451 0 0 1 12 4.5c4.756 0 8.773 3.162 10.065 7.498a10.522 10.522 0 0 1-4.293 5.774M6.228 6.228 3 3m3.228 3.228 3.65 3.65m7.894 7.894L21 21m-3.228-3.228-3.65-3.65m0 0a3 3 0 1 0-4.243-4.243m4.242 4.242L9.88 9.88" />
                </svg>
              </button>
            </div>
          </div>
        </div>

        

        <div class="pt-2">
          <button type="submit"
            class="flex w-full justify-center rounded-xl bg-emerald-500 hover:bg-emerald-400 px-4 py-2.5 text-xs font-bold uppercase tracking-wider text-gray-950 shadow-lg shadow-emerald-500/10 active:scale-[0.99] transition duration-150">
            Create Account
          </button>
        </div>
      </form>

      <div class="mt-5">
        <div class="relative flex items-center justify-center">
          <div class="w-full border-t border-white/10"></div>
          <span class="absolute bg-[#12161a] px-3 text-[9px] font-bold uppercase tracking-widest text-gray-400">
            Or Continue With
          </span>
        </div>
      </div>

      <div class="mt-4">
        <a href="{%url 'google_login'%}"
          class="flex w-full items-center justify-center gap-2.5 rounded-xl border border-white/10 bg-white/5 px-4 py-2.5 text-xs font-semibold text-white shadow-sm hover:border-white/20 hover:bg-white/[0.08] active:scale-[0.99] transition duration-150">
          <svg class="h-4 w-4" viewBox="0 0 24 24">
            <path fill="#4285F4"
              d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
            <path fill="#34A853"
              d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
            <path fill="#FBBC05"
              d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" />
            <path fill="#EA4335"
              d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
          </svg>
          <span>Google</span>
        </a>
      </div>

      

      <div class="mt-5 flex items-center justify-center text-center border-t border-white/5 pt-4">
        <p class="text-xs text-gray-500">
          Already have an account?
          <a href="{% url 'login'%}" class="font-bold text-emerald-400 hover:text-emerald-300 transition pl-1">
            Login
          </a>
        </p>
      </div>

    </main>
  </div>

  <script>
    function togglePassword(inputId, iconId) {
      const passwordInput = document.getElementById(inputId);
      const iconSvg = document.getElementById(iconId);
      
      const openPaths = iconSvg.querySelectorAll('.eye-open');
      const closedPath = iconSvg.querySelector('.eye-closed');

      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        openPaths.forEach(path => path.classList.add('hidden'));
        closedPath.classList.remove('hidden');
      } else {
        passwordInput.type = 'password';
        openPaths.forEach(path => path.classList.remove('hidden'));
        closedPath.classList.add('hidden');
      }
    }
  </script>

</body>

</html>
{% endblock %}
