<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Product - ShoeDrop Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>

<body class="bg-[#0B0B0C] text-gray-400 min-h-screen flex antialiased">

    <!-- SIDEBAR -->
    {% include 'admin/_sidebar.html' %}

    <!-- MAIN -->
    <main class="flex-grow p-8 lg:p-12 space-y-8 overflow-y-auto max-w-3xl">
        {% include 'admin/_messages.html' %}

        <!-- Breadcrumb & Header -->
        <div class="space-y-2">
            <div class="flex items-center gap-2 text-[10px] font-bold tracking-widest text-gray-500 uppercase">
                <a href="{% url 'admin_dashboard' %}" class="hover:text-white transition-colors">Console</a>
                <span>/</span>
                <a href="{% url 'product_list' %}" class="hover:text-white transition-colors">Products</a>
                <span>/</span>
                <span class="text-white">Edit</span>
            </div>
            <h1 class="text-3xl font-black text-white tracking-tight uppercase">Edit Product</h1>
        </div>

        <!-- Form Card -->
        <div class="bg-[#141416] border border-white/5 rounded-2xl p-6 sm:p-8 shadow-xl">
            <form method="POST" class="space-y-6">
                {% csrf_token %}

                <!-- Product Name -->
                <div class="space-y-2">
                    <label for="product_name" class="block text-[10px] font-bold tracking-widest text-gray-500 uppercase">Product Name</label>
                    <input type="text" id="product_name" name="product_name" value="{{ product.product_name }}" required
                        class="w-full bg-[#1C1C1E] border border-white/5 text-white text-xs px-4 py-3 rounded-xl outline-none focus:border-white/20 transition-colors placeholder-gray-600">
                </div>

                <!-- Category & Subcategory -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label for="category" class="block text-[10px] font-bold tracking-widest text-gray-500 uppercase">Category</label>
                        <div class="relative">
                            <select id="category" name="category" required
                                class="w-full bg-[#1C1C1E] border border-white/5 text-white text-xs px-4 py-3 rounded-xl outline-none focus:border-white/20 transition-colors cursor-pointer appearance-none">
                                <option value="" disabled>Select category</option>
                                {% for cat in categories %}
                                <option value="{{ cat.id }}" {% if product.category.id == cat.id %}selected{% endif %}>{{ cat.name }}</option>
                                {% endfor %}
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>

                    <div class="space-y-2">
                        <label for="subcategory" class="block text-[10px] font-bold tracking-widest text-gray-500 uppercase">Subcategory</label>
                        <div class="relative">
                            <select id="subcategory" name="subcategory" required
                                class="w-full bg-[#1C1C1E] border border-white/5 text-white text-xs px-4 py-3 rounded-xl outline-none focus:border-white/20 transition-colors cursor-pointer appearance-none">
                                {% for subcat in subcategories %}
                                <option value="{{ subcat.id }}" data-category="{{ subcat.category_id }}" {% if product.subcategory.id == subcat.id %}selected{% endif %}>{{ subcat.name }}</option>
                                {% endfor %}
                            </select>
                            <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-gray-500">
                                <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Description -->
                <div class="space-y-2">
                    <label for="description" class="block text-[10px] font-bold tracking-widest text-gray-500 uppercase">Description</label>
                    <textarea id="description" name="description" rows="4" required
                        class="w-full bg-[#1C1C1E] border border-white/5 text-white text-xs px-4 py-3 rounded-xl outline-none focus:border-white/20 transition-colors resize-none">{{ product.description }}</textarea>
                </div>

                <!-- Features -->
                <div class="space-y-2">
                    <label for="features" class="block text-[10px] font-bold tracking-widest text-gray-500 uppercase">Product Features</label>
                    <textarea id="features" name="features" rows="4"
                        class="w-full bg-[#1C1C1E] border border-white/5 text-white text-xs px-4 py-3 rounded-xl outline-none focus:border-white/20 transition-colors resize-none">{{ product.product_features }}</textarea>
                </div>

                <!-- Actions -->
                <div class="flex items-center gap-3 pt-4 border-t border-white/5">
                    <button type="submit" class="px-6 py-3 bg-white text-black rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-gray-200 transition-colors cursor-pointer">
                        Save Changes
                    </button>
                    <a href="{% url 'product_list' %}" class="px-6 py-3 bg-zinc-800 text-white border border-white/10 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-zinc-700 transition-colors">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </main>



<script>
    const categorySelect = document.getElementById('category');
    const subcategorySelect = document.getElementById('subcategory');
    const allOptions = Array.from(subcategorySelect.querySelectorAll('option[data-category]'));
    const currentSubcat = subcategorySelect.value;

    function filterSubcategories(preserveValue) {
        const selectedCat = categorySelect.value;
        allOptions.forEach(opt => opt.style.display = 'none');
        if (!preserveValue) subcategorySelect.value = '';
        allOptions.forEach(opt => {
            if (opt.dataset.category === selectedCat) {
                opt.style.display = '';
            }
        });
        if (preserveValue) subcategorySelect.value = currentSubcat;
    }

    categorySelect.addEventListener('change', () => filterSubcategories(false));

    // On page load: filter but keep the already-selected subcategory
    if (categorySelect.value) filterSubcategories(true);
</script>

</body>
</html>
