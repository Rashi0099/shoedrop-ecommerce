<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create New Coupon - ShoeDrop Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
    </style>
</head>
<body class="bg-[#0B0B0C] text-gray-400 min-h-screen flex items-center justify-center p-6 antialiased">

    <!-- Form Container (acting like the modal in the design) -->
    <div class="bg-[#141416] w-full max-w-3xl rounded-[2rem] border border-white/5 shadow-2xl p-10 relative">
        
        <a href="{% url 'coupon_list' %}" class="absolute top-8 right-8 text-gray-500 hover:text-white transition-colors">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
        </a>

        <h2 class="text-xl font-light tracking-[0.2em] text-white uppercase mb-10">Create New <span class="font-bold">Coupon</span></h2>

        {% include 'admin/_messages.html' %}

        <form method="POST" action="{% url 'add_coupon' %}">
            {% csrf_token %}
            <div class="grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-6">
                
                <!-- Coupon Name -->
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-gray-500 mb-2">Coupon Name</label>
                    <input type="text" name="coupon_name" required placeholder="e.g. Diwali Blast"
                        class="w-full bg-[#1C1C1E] text-white text-sm px-5 py-4 rounded-xl border border-white/5 outline-none focus:border-white/20 transition-colors">
                </div>

                <!-- Coupon Code -->
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-gray-500 mb-2">Coupon Code</label>
                    <div class="relative flex items-center">
                        <input type="text" name="coupon_code" id="coupon_code" required placeholder="SAVE20"
                            class="w-full bg-[#1C1C1E] text-white font-mono text-sm px-5 py-4 pr-32 rounded-xl border border-white/5 outline-none focus:border-white/20 transition-colors uppercase">
                        <button type="button" onclick="generateCode()" class="absolute right-2 px-4 py-2 bg-white/5 hover:bg-white/10 text-white rounded-lg text-[9px] font-bold uppercase tracking-[0.2em] transition-colors">
                            Generate
                        </button>
                    </div>
                </div>

                <!-- Discount Type -->
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-gray-500 mb-2">Discount Type</label>
                    <select name="discount_type" required
                        class="w-full bg-[#1C1C1E] text-white text-sm px-5 py-4 rounded-xl border border-white/5 outline-none focus:border-white/20 transition-colors appearance-none">
                        <option value="percentage">Percentage (%)</option>
                        <option value="flat">Flat Amount (₹)</option>
                    </select>
                </div>

                <!-- Discount Value -->
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-gray-500 mb-2">Discount Value</label>
                    <input type="number" name="discount_value" required step="0.01" placeholder="e.g. 20"
                        class="w-full bg-[#1C1C1E] text-white text-sm px-5 py-4 rounded-xl border border-white/5 outline-none focus:border-white/20 transition-colors">
                </div>

                <!-- Min Cart Value -->
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-gray-500 mb-2">Min Cart Value (₹)</label>
                    <input type="number" name="min_cart_value" required min="0" value="0"
                        class="w-full bg-[#1C1C1E] text-white text-sm px-5 py-4 rounded-xl border border-white/5 outline-none focus:border-white/20 transition-colors">
                </div>

                <!-- User Usage Limit -->
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-gray-500 mb-2">User Usage Limit</label>
                    <input type="number" name="usage_limit" required min="1" value="1"
                        class="w-full bg-[#1C1C1E] text-white text-sm px-5 py-4 rounded-xl border border-white/5 outline-none focus:border-white/20 transition-colors">
                </div>

                <!-- Applicable Category -->
                <div class="md:col-span-2">
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-gray-500 mb-2">Applicable Category</label>
                    <select name="applicable_category"
                        class="w-full bg-[#1C1C1E] text-white text-sm px-5 py-4 rounded-xl border border-white/5 outline-none focus:border-white/20 transition-colors appearance-none">
                        <option value="">-- Apply to All Categories --</option>
                        {% for cat in categories %}
                        <option value="{{ cat.id }}">{{ cat.name }}</option>
                        {% endfor %}
                    </select>
                    <p class="text-[8px] text-gray-600 mt-2 tracking-widest uppercase">Leave blank to apply coupon store-wide.</p>
                </div>

                <!-- Valid From -->
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-gray-500 mb-2">Valid From</label>
                    <input type="datetime-local" name="valid_from"
                        class="w-full bg-[#1C1C1E] text-white text-sm px-5 py-4 rounded-xl border border-white/5 outline-none focus:border-white/20 transition-colors style-date">
                </div>

                <!-- Valid Till -->
                <div>
                    <label class="block text-[9px] font-bold uppercase tracking-widest text-gray-500 mb-2">Valid Till</label>
                    <input type="datetime-local" name="valid_till"
                        class="w-full bg-[#1C1C1E] text-white text-sm px-5 py-4 rounded-xl border border-white/5 outline-none focus:border-white/20 transition-colors style-date">
                </div>

            </div>

            <!-- Actions -->
            <div class="flex items-center justify-end gap-6 mt-12 pt-6 border-t border-white/5">
                <a href="{% url 'coupon_list' %}" class="text-[10px] font-bold uppercase tracking-[0.2em] text-gray-400 hover:text-white transition-colors">Cancel</a>
                <button type="submit" class="px-8 py-4 bg-[#114030] hover:bg-[#0d3024] text-[#86e2b5] rounded-full text-[10px] font-bold uppercase tracking-[0.2em] transition-colors">
                    Create Coupon
                </button>
            </div>
        </form>
    </div>

    <script>
        function generateCode() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let code = 'SD-';
            for (let i = 0; i < 8; i++) {
                code += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            document.getElementById('coupon_code').value = code;
        }
    </script>
</body>
</html>
